<!DOCTYPE html>
<html lang="en">
<head>
    <title>Greeting Message</title> 
    <style>
body {
    background-color: transparent; /* Fondo transparente, se adapta a la hoja */
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
#lbl {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 16px;           /* Saludo más pequeño y delicado */
    color: #c9a789;            /* Color marrón elegante */
    padding: 10px 18px;        /* Mismo tamaño de recuadro (padding chico) */
    border: 1px solid #c9a789; /* Borde marrón fino */
    text-align: center;
    line-height: 1.3;
    min-width: 170px;          /* Mismo ancho del cuadro anterior */
    background-color: transparent; /* Fondo del cuadro también transparente */
}
#date {
    font-size: 12px;           /* Letras de la fecha más pequeñas en proporción */
    margin-top: 4px;
}
    </style>
</head>
<body>
    <div id="lbl"></div>
</body>
<script>
    var weekday = new Array(7);
    weekday[0] = "Sunday";
    weekday[1] = "Monday";
    weekday[2] = "Tuesday";
    weekday[3] = "Wednesday";
    weekday[4] = "Thursday";
    weekday[5] = "Friday";
    weekday[6] = "Saturday";
    var today = new Date();
    var hrs = today.getHours();
    var dayOfWeek = weekday[today.getDay()];
    var date = dayOfWeek + " " + today.getDate() + "/" + (today.getMonth() + 1) + '/' + today.getFullYear();
    var greet;
    if (hrs < 12)
        greet = 'Good Morning 𖹭 ';
    else if (hrs >= 12 && hrs <= 17)
        greet = 'Good Afternoon 𖹭';
    else if (hrs >= 17 && hrs <= 24)
        greet = 'Good Evening 𖹭 ';
    document.getElementById('lbl').innerHTML =
        greet += `<div id="date"> It's ${date}</div>`;
</script> 
</html>
